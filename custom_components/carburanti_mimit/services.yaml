# Schema campi per i servizi Carburanti MIMIT.
# name e description di ogni servizio sono definiti in strings.json (localizzabili).
# Questo file definisce solo lo schema/selectors dei campi.

force_refresh:
  fields:
    entry_id:
      name: ID integrazione
      description: >
        ID della configurazione da aggiornare (visibile in Impostazioni → Dispositivi e servizi).
        Se omesso, aggiorna tutte le configurazioni Carburanti MIMIT.
      required: false
      example: "abc123def456"
      selector:
        text:

get_cheapest_near:
  fields:
    latitude:
      name: Latitudine
      description: Latitudine del punto di ricerca (WGS-84).
      required: true
      example: 45.4642
      selector:
        number:
          min: -90
          max: 90
          step: "any"
          mode: box
    longitude:
      name: Longitudine
      description: Longitudine del punto di ricerca (WGS-84).
      required: true
      example: 9.1900
      selector:
        number:
          min: -180
          max: 180
          step: "any"
          mode: box
    fuel_type:
      name: Tipo carburante
      description: Tipo di carburante da cercare.
      required: true
      example: "Benzina"
      selector:
        select:
          options:
            - "Benzina"
            - "Gasolio"
            - "GPL"
            - "Metano"
            - "HVO"
            - "Gasolio Riscaldamento"
    radius_km:
      name: Raggio (km)
      description: Raggio di ricerca in chilometri (0.5–100). Default 5 km.
      required: false
      default: 5
      example: 10
      selector:
        number:
          min: 0.5
          max: 100
          step: 0.5
          unit_of_measurement: km
    top_n:
      name: Numero risultati
      description: Numero massimo di distributori da restituire (1–20). Default 3.
      required: false
      default: 3
      example: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          mode: slider

clear_history:
  fields:
    entry_id:
      name: ID integrazione
      description: ID della configurazione di cui cancellare lo storico.
      required: true
      example: "abc123def456"
      selector:
        text:
    fuel_type:
      name: Tipo carburante
      description: >
        Tipo di carburante da cancellare. Se omesso, cancella lo storico di tutti i tipi.
      required: false
      example: "Benzina"
      selector:
        select:
          options:
            - "Benzina"
            - "Gasolio"
            - "GPL"
            - "Metano"
            - "HVO"
            - "Gasolio Riscaldamento"
