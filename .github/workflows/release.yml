name: Release

# Triggers:
#   push to main                  → stable release with auto-incremented patch version
#   push to any non-main branch   → beta pre-release for that branch
#                                    (old beta for the same branch is deleted first)
#   tag push  vX.Y.Z              → stable release (kept forever, marked as latest)
#   tag push  vX.Y.Z-*            → explicit pre-release (kept forever)
#   workflow_dispatch             → manual stable/pre-release from Actions UI
on:
  push:
    branches:
      - main
      - "**"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0 or 1.0.1-beta.1) — without leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Validate — must pass before we publish anything
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Run HACS validation
        uses: hacs/action@main
        continue-on-error: true
        with:
          category: integration

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            python -c "import json, sys; json.load(open('$f'))" && echo "OK: $f" || exit 1
          done

      - name: Validate YAML files
        run: |
          pip install --quiet pyyaml
          for f in $(find . -name "*.yaml" -o -name "*.yml" | grep -v ".git"); do
            python -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "OK: $f" || exit 1
          done

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Release — runs only if validate passes
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version & release-type detection ──────────────────────────────
      - name: Determine version and release type
        id: version
        run: |
          EVENT="${{ github.event_name }}"
          REF="${GITHUB_REF}"
          SHORT_SHA="${GITHUB_SHA::7}"

          BASE_VERSION=$(python -c "import json; print(json.load(open('custom_components/carburanti_mimit/manifest.json'))['version'])")

          if [ "$EVENT" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            # ── Stable release from main push: auto-increment patch ────
            MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
            MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
            PATCH=$(echo "$BASE_VERSION" | cut -d. -f3 | cut -d- -f1)
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            TAG="v${VERSION}"
            IS_PRERELEASE=false
            IS_BETA=false

          elif [ "$EVENT" = "push" ] && [[ "$REF" == refs/heads/* ]]; then
            # ── Beta from non-main branch push ─────────────────────────
            BRANCH="${GITHUB_REF_NAME}"
            # Sanitize: replace every / and non-alphanumeric char with -
            BRANCH_SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
            TAG="beta-${BRANCH_SLUG}"
            VERSION="${BASE_VERSION}-beta.${SHORT_SHA}"
            IS_PRERELEASE=true
            IS_BETA=true

          elif [ "$EVENT" = "workflow_dispatch" ]; then
            # ── Manual stable/pre-release ──────────────────────────────
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
            IS_BETA=false
            if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi

          else
            # ── Tag push ───────────────────────────────────────────────
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            IS_BETA=false
            if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          fi

          echo "tag=$TAG"                        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE"    >> "$GITHUB_OUTPUT"
          echo "is_beta=$IS_BETA"                >> "$GITHUB_OUTPUT"

          echo "Trigger    : $EVENT"
          echo "Tag        : $TAG"
          echo "Version    : $VERSION"
          echo "Pre-release: $IS_PRERELEASE"
          echo "Beta       : $IS_BETA"

      # ── Beta only: delete old release + tag for this branch ───────────
      - name: Delete existing beta release and tag
        if: steps.version.outputs.is_beta == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          gh release delete "$TAG" --yes --repo "${{ github.repository }}" 2>/dev/null \
            && echo "Deleted GitHub release: $TAG" \
            || echo "No existing GitHub release for $TAG — skipping"

          git push origin ":refs/tags/$TAG" 2>/dev/null \
            && echo "Deleted remote tag: $TAG" \
            || echo "No remote tag $TAG — skipping"

      # ── Beta only: create new tag on HEAD ─────────────────────────────
      - name: Create beta tag
        if: steps.version.outputs.is_beta == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Beta release ${{ steps.version.outputs.version }}"
          git push origin "$TAG"

      # ── Stable only: create tag for main push or workflow_dispatch ───
      - name: Create stable tag (main push or workflow_dispatch)
        if: steps.version.outputs.is_beta != 'true' && (github.event_name == 'workflow_dispatch' || github.ref_name == 'main')
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # ── Stable only: bump manifest.json and commit back to main ───────
      - name: Bump version in manifest.json
        if: steps.version.outputs.is_beta != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MANIFEST="custom_components/carburanti_mimit/manifest.json"
          python - <<EOF
          import json, pathlib
          p = pathlib.Path("$MANIFEST")
          data = json.loads(p.read_text())
          data["version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n")
          print(f"manifest.json version set to {data['version']}")
          EOF

      - name: Commit manifest version bump
        if: steps.version.outputs.is_beta != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/carburanti_mimit/manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json already at version $VERSION — no commit needed"
          else
            git commit -m "chore: bump manifest version to $VERSION [skip ci]"
            git push origin HEAD:main
          fi

      # ── Build ZIP for HACS ────────────────────────────────────────────
      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPFILE="carburanti_mimit-${VERSION}.zip"
          cd custom_components
          zip -r "../${ZIPFILE}" carburanti_mimit/
          cd ..
          echo "Created: $ZIPFILE ($(du -sh "$ZIPFILE" | cut -f1))"
          echo "zipfile=$ZIPFILE" >> "$GITHUB_ENV"

      # ── Generate release notes ─────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_BETA="${{ steps.version.outputs.is_beta }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"
          BRANCH="${GITHUB_REF_NAME}"

          if [ "$IS_BETA" = "true" ]; then
            BADGE="🔧 **Beta automatica** dal branch \`${BRANCH}\`. Non usare in produzione."
          elif [ "$IS_PRERELEASE" = "true" ]; then
            BADGE="⚠️ **Pre-release** — potrebbe contenere modifiche sperimentali."
          else
            BADGE="✅ **Release stabile**"
          fi

          cat > /tmp/release_notes.md <<MARKDOWN
          ## Carburanti MIMIT ${VERSION}

          ${BADGE}

          ### Installazione tramite HACS

          1. In HACS → Integrations → Menu (3 punti) → **Custom repositories**
          2. Aggiungi: \`https://github.com/${{ github.repository }}\` → Integration
          3. Cerca **Carburanti MIMIT** → Installa → Riavvia HA

          ### Installazione manuale

          Scarica \`carburanti_mimit-${VERSION}.zip\`, estrai e copia la cartella
          \`carburanti_mimit/\` in \`config/custom_components/\`. Riavvia Home Assistant.

          ### Changelog

          Vedi i commit inclusi in questa release per il dettaglio delle modifiche.
          MARKDOWN

          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Carburanti MIMIT ${{ steps.version.outputs.version }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          make_latest: ${{ steps.version.outputs.is_prerelease == 'false' }}
          files: |
            ${{ env.zipfile }}
          generate_release_notes: true
