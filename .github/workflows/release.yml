name: Release

# Triggers on a version tag push (vX.Y.Z or vX.Y.Z-suffix)
# or manually from the Actions UI.
#
# Tag push examples:
#   v1.0.0          → stable release (marked as latest)
#   v1.0.1-beta.1   → pre-release
#
# Manual dispatch: Actions → Release → Run workflow → enter version
#   e.g. "1.0.0" for stable, "1.0.1-beta.1" for pre-release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0 or 1.0.1-beta.1) — without leading v"
        required: true
        type: string

permissions:
  contents: write   # create releases, tags, push manifest bump commit

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Validate — must pass before we publish anything
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Run HACS validation
        uses: hacs/action@main
        # continue-on-error: topics/description are GitHub repo settings (UI),
        # not code issues. HACS also requires at least one published release,
        # so the first run will fail here — that is expected.
        continue-on-error: true
        with:
          category: integration

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            python -c "import json, sys; json.load(open('$f'))" && echo "OK: $f" || exit 1
          done

      - name: Validate YAML files
        run: |
          pip install --quiet pyyaml
          for f in $(find . -name "*.yaml" -o -name "*.yml" | grep -v ".git"); do
            python -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "OK: $f" || exit 1
          done

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Release — runs only if validate passes
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so we can commit the manifest bump
          fetch-depth: 0

      # ── Version detection ──────────────────────────────────────────────
      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            RAW_TAG="v${VERSION}"
          else
            # Tag push: refs/tags/v1.0.0 → v1.0.0
            RAW_TAG="${GITHUB_REF_NAME}"
            VERSION="${RAW_TAG#v}"
          fi

          # Detect pre-release: version contains a hyphen after the semver core
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
            IS_PRERELEASE=true
            RELEASE_TYPE="pre-release"
          else
            IS_PRERELEASE=false
            RELEASE_TYPE="release"
          fi

          echo "tag=$RAW_TAG"                    >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE"    >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE"      >> "$GITHUB_OUTPUT"

          echo "Trigger    : ${{ github.event_name }}"
          echo "Tag        : $RAW_TAG"
          echo "Version    : $VERSION"
          echo "Pre-release: $IS_PRERELEASE"

      # ── Create git tag for workflow_dispatch (tag pushes already have one) ──
      - name: Create and push git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fail gracefully if tag already exists
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping tag creation"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # ── Update manifest.json version and commit it ─────────────────────
      - name: Bump version in manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MANIFEST="custom_components/carburanti_mimit/manifest.json"

          python - <<EOF
          import json, pathlib
          p = pathlib.Path("$MANIFEST")
          data = json.loads(p.read_text())
          data["version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n")
          print(f"manifest.json version set to {data['version']}")
          EOF

      - name: Commit manifest version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add custom_components/carburanti_mimit/manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json already at version $VERSION — no commit needed"
          else
            git commit -m "chore: bump manifest version to $VERSION [skip ci]"
            git push origin HEAD:main
          fi

      # ── Build ZIP for HACS ─────────────────────────────────────────────
      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPFILE="carburanti_mimit-${VERSION}.zip"

          cd custom_components
          zip -r "../${ZIPFILE}" carburanti_mimit/
          cd ..

          echo "Created: $ZIPFILE ($(du -sh "$ZIPFILE" | cut -f1))"
          echo "zipfile=$ZIPFILE" >> "$GITHUB_ENV"

      # ── Generate release notes ─────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            BADGE="⚠️ **Pre-release** — potrebbe contenere modifiche sperimentali. Non usare in produzione senza aver testato."
          else
            BADGE="✅ **Release stabile**"
          fi

          cat > /tmp/release_notes.md <<MARKDOWN
          ## Carburanti MIMIT ${VERSION}

          ${BADGE}

          ### Installazione tramite HACS

          1. In HACS → Integrations → Menu (3 punti) → **Custom repositories**
          2. Aggiungi: \`https://github.com/${{ github.repository }}\` → Integration
          3. Cerca **Carburanti MIMIT** → Installa → Riavvia HA

          ### Installazione manuale

          Scarica \`carburanti_mimit-${VERSION}.zip\`, estrai e copia la cartella
          \`carburanti_mimit/\` in \`config/custom_components/\`. Riavvia Home Assistant.

          ### Changelog

          Vedi i commit inclusi in questa release per il dettaglio delle modifiche.
          MARKDOWN

          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Carburanti MIMIT ${{ steps.version.outputs.version }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          make_latest: ${{ steps.version.outputs.is_prerelease == 'false' }}
          files: |
            ${{ env.zipfile }}
          generate_release_notes: true
