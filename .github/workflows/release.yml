name: Release

# Triggers on any tag push matching vX.Y.Z or vX.Y.Z-<pre-release>
# Examples:
#   v1.0.0          → stable release  (latest)
#   v1.0.1-beta.1   → pre-release
#   v1.1.0-rc.2     → pre-release
#   v2.0.0-alpha.1  → pre-release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # stable:     v1.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-*"        # pre-release: v1.0.0-beta.1, v1.0.0-rc.1, etc.

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Validate — must pass before we publish anything
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Run HACS validation
        uses: hacs/action@main
        continue-on-error: true   # topics/description are repo settings, not code issues
        with:
          category: integration

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            python -c "import json, sys; json.load(open('$f'))" && echo "OK: $f" || exit 1
          done

      - name: Validate YAML files
        run: |
          pip install --quiet pyyaml
          for f in $(find . -name "*.yaml" -o -name "*.yml" | grep -v ".git"); do
            python -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "OK: $f" || exit 1
          done

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Release — runs only if validate passes
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Version detection ──────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"          # e.g. v1.0.1-beta.1
          VERSION="${RAW_TAG#v}"                # strip leading 'v' → 1.0.1-beta.1

          # Detect pre-release: tag contains a hyphen after the semver core
          # Matches: -alpha, -beta, -rc, -dev, or any custom suffix
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
            IS_PRERELEASE=true
            RELEASE_TYPE="pre-release"
          else
            IS_PRERELEASE=false
            RELEASE_TYPE="release"
          fi

          echo "tag=$RAW_TAG"             >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE"   >> "$GITHUB_OUTPUT"

          echo "Tag        : $RAW_TAG"
          echo "Version    : $VERSION"
          echo "Pre-release: $IS_PRERELEASE"

      # ── Update manifest.json version ──────────────────────────────────
      - name: Bump version in manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MANIFEST="custom_components/carburanti_mimit/manifest.json"

          # Use Python for safe JSON manipulation (avoids jq dependency issues)
          python - <<EOF
          import json, pathlib
          p = pathlib.Path("$MANIFEST")
          data = json.loads(p.read_text())
          data["version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n")
          print(f"manifest.json version set to {data['version']}")
          EOF

      # ── Build ZIP for HACS ─────────────────────────────────────────────
      # HACS can install from raw repo structure, but a versioned ZIP lets
      # users download / pin a specific release manually.
      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIPFILE="carburanti_mimit-${VERSION}.zip"

          cd custom_components
          zip -r "../${ZIPFILE}" carburanti_mimit/
          cd ..

          echo "Created: $ZIPFILE ($(du -sh "$ZIPFILE" | cut -f1))"
          echo "zipfile=$ZIPFILE" >> "$GITHUB_ENV"

      # ── Generate release notes ─────────────────────────────────────────
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IS_PRERELEASE="${{ steps.version.outputs.is_prerelease }}"
          RELEASE_TYPE="${{ steps.version.outputs.release_type }}"

          if [ "$IS_PRERELEASE" = "true" ]; then
            BADGE="⚠️ **Pre-release** — potrebbe contenere modifiche sperimentali. Non usare in produzione senza aver testato."
          else
            BADGE="✅ **Release stabile**"
          fi

          NOTES=$(cat <<MARKDOWN
          ## Carburanti MIMIT ${VERSION}

          ${BADGE}

          ### Installazione tramite HACS

          1. In HACS → Integrations → Menu (3 punti) → **Custom repositories**
          2. Aggiungi: \`https://github.com/${{ github.repository }}\` → Integration
          3. Cerca **Carburanti MIMIT** → Installa → Riavvia HA

          ### Installazione manuale

          Scarica \`carburanti_mimit-${VERSION}.zip\`, estrai e copia la cartella
          \`carburanti_mimit/\` in \`config/custom_components/\`. Riavvia Home Assistant.

          ### Changelog

          Vedi i commit inclusi in questa release per il dettaglio delle modifiche.
          MARKDOWN
          )

          # Write to a temp file to handle multi-line output safely
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Carburanti MIMIT ${{ steps.version.outputs.version }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          # mark stable releases as "latest"; pre-releases are never "latest"
          make_latest: ${{ steps.version.outputs.is_prerelease == 'false' && 'true' || 'false' }}
          files: |
            ${{ env.zipfile }}
          generate_release_notes: true   # appends auto-generated commit list
