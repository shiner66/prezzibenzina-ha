name: Validate

# Runs on branch pushes and pull requests.
# Tag pushes are handled by release.yml (which also validates before publishing).
on:
  push:
    branches: ["main", "claude/**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        # continue-on-error is intentional: HACS validation requires:
        #   1. At least one published GitHub release (chicken-and-egg on first run)
        #   2. The "hacshomeassistant" topic set on the repository (GitHub UI setting)
        # Code-level issues (manifest, file structure) will still surface in the logs.
        continue-on-error: true
        with:
          category: integration

  lint:
    name: Lint JSON/YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            python -c "import json, sys; json.load(open('$f'))" && echo "OK: $f" || exit 1
          done

      - name: Validate YAML files
        run: |
          pip install --quiet pyyaml
          for f in $(find . -name "*.yaml" -o -name "*.yml" | grep -v ".git"); do
            python -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "OK: $f" || exit 1
          done
