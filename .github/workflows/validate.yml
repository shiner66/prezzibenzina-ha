name: Validate

# Runs on every branch push and pull requests targeting main.
# Tag pushes are handled by release.yml which also validates before publishing.
on:
  push:
    branches: ["main", "claude/**", "feature/**", "fix/**", "release/**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # continue-on-error: first run requires a published release + repository topic
      - uses: hacs/action@main
        continue-on-error: true
        with:
          category: integration

  lint:
    name: Lint (JSON / YAML / Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            python -c "import json, sys; json.load(open('$f'))" && echo "OK: $f" || exit 1
          done

      - name: Validate YAML files
        run: |
          pip install --quiet pyyaml
          for f in $(find . -name "*.yaml" -o -name "*.yml" | grep -v ".git"); do
            python -c "import yaml, sys; yaml.safe_load(open('$f'))" && echo "OK: $f" || exit 1
          done

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements_test.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore
